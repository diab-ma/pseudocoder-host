<svg id="ascii-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1250 220" width="100%" height="100%" style="background: transparent;"><defs><style>
            .terminal-text {
              font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
              font-size: 14px;
              fill: #00ff88;
              white-space: pre;
            }
            .voxel-front {
              fill: #00ff88;
            }
            .voxel-side {
              fill: #008044;
            }
            .voxel-bottom {
              fill: #004022;
            }
            .cursor {
              animation: blink 1s step-end infinite;
              fill: #00ff88;
            }
            @keyframes blink {
              0%, 100% { opacity: 1; }
              50% { opacity: 0; }
